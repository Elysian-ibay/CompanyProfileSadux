<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />

  <!-- Icons: set dynamically from CMS (site_favicon / site_logo via Supabase) -->
  <link id="app-favicon" rel="icon" type="image/png" href="" />
  <link id="app-apple-icon" rel="apple-touch-icon" href="" />

  <!-- SEO meta — overridden at runtime by applyGlobalBranding() in App.jsx -->
  <title>SaduX - Company Profile</title>
  <meta id="meta-description" name="description" content="Sadulur Teknologi Indonesia — Innovate. Integrate. Inspire." />

  <!-- Open Graph (Facebook, WhatsApp, Telegram, LinkedIn, Slack…) -->
  <meta id="og-title" property="og:title" content="SaduX - Company Profile" />
  <meta id="og-description" property="og:description" content="Sadulur Teknologi Indonesia — Innovate. Integrate. Inspire." />
  <meta id="og-type" property="og:type" content="website" />
  <meta id="og-url" property="og:url" content="https://sadux.my.id" />
  <meta id="og-image" property="og:image" content="" />
  <meta id="og-image-width" property="og:image:width" content="1200" />
  <meta id="og-image-height" property="og:image:height" content="630" />
  <meta id="og-site-name" property="og:site_name" content="SaduX" />

  <!-- Twitter / X Card -->
  <meta id="tw-card" name="twitter:card" content="summary_large_image" />
  <meta id="tw-title" name="twitter:title" content="SaduX - Company Profile" />
  <meta id="tw-description" name="twitter:description" content="Sadulur Teknologi Indonesia — Innovate. Integrate. Inspire." />
  <meta id="tw-image" name="twitter:image" content="" />

  <!-- Robots -->
  <meta name="robots" content="index, follow" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
